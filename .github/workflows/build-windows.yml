name: Build Windows EXE

on:
  workflow_dispatch:  # Manual trigger from GitHub UI

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download spaCy models
        run: |
          python -m spacy download en_core_web_sm
          python -m spacy download es_core_news_sm

      - name: Download NLTK data
        run: |
          python -c "import nltk; nltk.download('stopwords', download_dir='./nltk_data'); nltk.download('punkt', download_dir='./nltk_data'); nltk.download('punkt_tab', download_dir='./nltk_data')"

      - name: Build EXE with PyInstaller
        run: pyinstaller EPA_Dashboard.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EPA_Dashboard-windows
          path: dist/EPA_Dashboard/
          retention-days: 30
