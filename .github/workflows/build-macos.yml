name: Build macOS App

on:
  workflow_dispatch:  # Manual trigger from GitHub UI

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download spaCy models
        run: |
          python -m spacy download en_core_web_sm
          python -m spacy download es_core_news_sm

      - name: Download NLTK data
        run: |
          python -c "import nltk; nltk.download('stopwords', download_dir='./nltk_data'); nltk.download('punkt', download_dir='./nltk_data'); nltk.download('punkt_tab', download_dir='./nltk_data')"

      - name: Build .app with PyInstaller
        run: pyinstaller EPA_Dashboard.spec

      - name: Create DMG installer
        run: |
          # Create a temporary DMG layout folder
          mkdir -p dmg_contents
          cp -R dist/EPA_Dashboard.app dmg_contents/

          # Create a symbolic link to /Applications for drag-and-drop
          ln -s /Applications dmg_contents/Applications

          # Create the DMG
          hdiutil create \
            -volname "EPA Dashboard" \
            -srcfolder dmg_contents \
            -ov \
            -format UDZO \
            EPA_Dashboard.dmg

          echo "DMG created:"
          ls -la EPA_Dashboard.dmg

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: EPA_Dashboard-macos-dmg
          path: EPA_Dashboard.dmg
          retention-days: 30
