name: Build macOS App

on:
  workflow_dispatch:  # Manual trigger from GitHub UI

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download spaCy models
        run: |
          python -m spacy download en_core_web_sm
          python -m spacy download es_core_news_sm

      - name: Download NLTK data
        run: |
          python -c "import nltk; nltk.download('stopwords', download_dir='./nltk_data'); nltk.download('punkt', download_dir='./nltk_data'); nltk.download('punkt_tab', download_dir='./nltk_data')"

      - name: Build .app with PyInstaller
        run: pyinstaller EPA_Dashboard.spec

      - name: Create PKG installer
        run: |
          # Create payload with the .app
          mkdir -p pkg_payload
          cp -R dist/EPA_Dashboard.app pkg_payload/EPA_Dashboard.app

          # Step 1: Build component package
          pkgbuild \
            --root pkg_payload \
            --identifier com.epai.dashboard \
            --version 1.0.0 \
            --install-location /Applications \
            EPA_Dashboard_component.pkg

          # Step 2: Create distribution XML for proper installer UI
          cat > distribution.xml << 'DISTXML'
          <?xml version="1.0" encoding="utf-8"?>
          <installer-gui-script minSpecVersion="2">
              <title>EPA Dashboard</title>
              <options customize="never" require-scripts="false"/>
              <domains enable_anywhere="false" enable_currentUserHome="false" enable_localSystem="true"/>
              <choices-outline>
                  <line choice="default">
                      <line choice="com.epai.dashboard"/>
                  </line>
              </choices-outline>
              <choice id="default"/>
              <choice id="com.epai.dashboard" visible="false">
                  <pkg-ref id="com.epai.dashboard"/>
              </choice>
              <pkg-ref id="com.epai.dashboard" version="1.0.0" onConclusion="none">EPA_Dashboard_component.pkg</pkg-ref>
          </installer-gui-script>
          DISTXML

          # Step 3: Build distribution package (proper macOS installer)
          productbuild \
            --distribution distribution.xml \
            --package-path . \
            EPA_Dashboard.pkg

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: EPA_Dashboard-macos-app
          path: dist/EPA_Dashboard.app
          retention-days: 30

      - name: Upload .pkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: EPA_Dashboard-macos-pkg
          path: EPA_Dashboard.pkg
          retention-days: 30
