name: Build macOS App

on:
  workflow_dispatch:  # Manual trigger from GitHub UI

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download spaCy models
        run: |
          python -m spacy download en_core_web_sm
          python -m spacy download es_core_news_sm

      - name: Download NLTK data
        run: |
          python -c "import nltk; nltk.download('stopwords', download_dir='./nltk_data'); nltk.download('punkt', download_dir='./nltk_data'); nltk.download('punkt_tab', download_dir='./nltk_data')"

      - name: Build .app with PyInstaller
        run: pyinstaller EPA_Dashboard.spec

      - name: Create PKG installer
        run: |
          # Use --component to directly package the .app bundle into /Applications
          pkgbuild \
            --component dist/EPA_Dashboard.app \
            --install-location /Applications \
            --identifier com.epai.dashboard \
            --version 1.0.0 \
            EPA_Dashboard.pkg
          echo "PKG created:"
          ls -la EPA_Dashboard.pkg
          echo "PKG payload files:"
          pkgutil --payload-files EPA_Dashboard.pkg | head -5

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: EPA_Dashboard-macos-app
          path: dist/EPA_Dashboard.app
          retention-days: 30

      - name: Upload .pkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: EPA_Dashboard-macos-pkg
          path: EPA_Dashboard.pkg
          retention-days: 30
